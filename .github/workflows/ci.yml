name: Java CI with Maven


on:
  push:
    branches: [ "main", "dev", "dev-ale" ]
  pull_request:
    branches: [ "main", "dev", "dev-ale" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga el código del repositorio
    - uses: actions/checkout@v4

    # 2. Configura el entorno de Java (JDK 17 como en tu proyecto)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Compila y corre pruebas usando Maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    # 4. (Opcional) Sube el archivo .jar resultante como un "artefacto"
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: bazar-app-jar
        path: target/*.jar