<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${producto.name} + ' - Bazarcito'">Detalle de prenda</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <style>
        body { background: #F5F0E7; }
        .detail-shell {
            max-width: 1180px;
            margin: 0 auto;
            padding: 5rem 2rem 5rem;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 1.2rem;
        }
        .product-detail {
            display: grid;
            grid-template-columns: minmax(320px, 1fr) minmax(320px, 0.95fr);
            gap: 1.5rem;
            align-items: start;
        }
        .media-panel,
        .info-panel {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }
        .media-frame {
            aspect-ratio: 4 / 5;
            background: #EDE4D7;
            display: grid;
            place-items: center;
            overflow: hidden;
        }
        .media-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .media-empty {
            color: var(--text-muted);
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .info-panel {
            padding: 2rem;
            position: sticky;
            top: 5.5rem;
        }
        .eyebrow {
            font-size: 0.68rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
        }
        .product-title {
            font-family: var(--font-serif);
            font-size: clamp(2.3rem, 5vw, 4.4rem);
            line-height: 0.95;
            font-weight: 800;
            color: var(--text-dark);
            overflow-wrap: anywhere;
            margin-bottom: 1rem;
        }
        .brand-line {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.4rem;
        }
        .product-price {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 1rem;
        }
        .status-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.4rem;
        }
        .chip {
            display: inline-flex;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 0.28rem 0.7rem;
            font-size: 0.72rem;
            color: var(--text-muted);
            background: #FFFDF9;
        }
        .description {
            color: var(--text-muted);
            line-height: 1.7;
            margin: 1.5rem 0;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }
        .size-block {
            margin-bottom: 1.25rem;
        }
        .section-label {
            display: block;
            margin-bottom: 0.55rem;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dark);
            font-weight: 700;
        }
        .size-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .size-option {
            position: relative;
            cursor: pointer;
        }
        .size-option input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        .size-option span {
            display: inline-flex;
            min-width: 48px;
            justify-content: center;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 0.42rem 0.75rem;
            background: #FFFDF9;
            font-size: 0.82rem;
            font-weight: 700;
        }
        .size-option input:checked + span {
            background: var(--text-dark);
            color: var(--bg-primary);
            border-color: var(--text-dark);
        }
        .purchase-row {
            display: grid;
            grid-template-columns: 90px 1fr;
            gap: 0.75rem;
            margin-top: 1.2rem;
        }
        .quantity-input {
            width: 100%;
            min-height: 52px;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: #FFFDF9;
            font: inherit;
            color: var(--text-dark);
        }
        .btn-cart {
            min-height: 52px;
            justify-content: center;
            border: 0;
            cursor: pointer;
            width: 100%;
        }
        .sold-box {
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            color: var(--text-muted);
            background: #FFFDF9;
        }
        .seller-card {
            margin-top: 1.5rem;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #FFFDF9;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: center;
        }
        .seller-card strong { display: block; }
        .seller-card span { color: var(--text-muted); font-size: 0.84rem; }
        @media (max-width: 860px) {
            .product-detail { grid-template-columns: 1fr; }
            .info-panel { position: static; }
        }
        @media (max-width: 520px) {
            .detail-shell { padding-left: 1rem; padding-right: 1rem; }
            .info-panel { padding: 1.25rem; }
            .purchase-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-links">
            <a th:href="@{/colecciones}">Colecciones</a>
            <a th:href="@{/creadores}">Creadores</a>
            <a th:href="@{/tiendas}">Tiendas</a>
        </div>
        <a class="nav-logo" th:href="@{/}">Baz<span>ar</span>cito</a>
        <div class="nav-right">
            <a th:href="@{/vender}" class="nav-action">Vender</a>
            <a sec:authorize="isAnonymous()" th:href="@{/login}" class="nav-action">Acceder</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/dashboard}" class="nav-action">Mi cuenta</a>
        </div>
    </nav>

    <main class="detail-shell">
        <a class="back-link"
           th:href="${producto.seller != null ? '/tienda/' + producto.seller.id : '/colecciones'}">
            ← Volver
        </a>

        <section class="product-detail">
            <div class="media-panel">
                <div class="media-frame">
                    <img th:if="${producto.image != null and (producto.image.startsWith('http') or producto.image.startsWith('/uploads/'))}"
                         th:src="${producto.image}" th:alt="${producto.name}">
                    <img th:if="${producto.image != null and !(producto.image.startsWith('http') or producto.image.startsWith('/uploads/'))}"
                         th:src="@{'/images/' + ${producto.image}}" th:alt="${producto.name}">
                    <div class="media-empty" th:if="${producto.image == null}">Sin imagen</div>
                </div>
            </div>

            <aside class="info-panel">
                <div class="eyebrow" th:text="${producto.status != null ? producto.status : 'Disponible'}">Disponible</div>
                <h1 class="product-title" th:text="${producto.name}">Nombre de prenda</h1>
                <div class="brand-line" th:text="${producto.brand}">Marca</div>
                <div class="product-price" th:text="'$' + ${#numbers.formatDecimal(producto.price, 1, 'COMMA', 2, 'POINT')} + ' MXN'">$0 MXN</div>

                <div class="status-row">
                    <span class="chip" th:text="${producto.stock > 0 ? producto.stock + ' disponibles' : 'Agotado'}">Stock</span>
                    <span class="chip" th:if="${producto.sizes != null and !producto.sizes.isEmpty()}"
                          th:text="${producto.sizes.size()} + ' tallas'">Tallas</span>
                </div>

                <p class="description" th:if="${producto.description != null and !producto.description.isBlank()}"
                   th:text="${producto.description}">Descripcion</p>

                <div th:if="${producto.stock > 0 and producto.status.name() != 'SOLD'}">
                    <form th:action="@{/cart/add/{id}(id=${producto.id})}" method="post">
                        <div class="size-block" th:if="${producto.sizes != null and !producto.sizes.isEmpty()}">
                            <span class="section-label">Selecciona talla</span>
                            <div class="size-grid">
                                <label class="size-option" th:each="size, iter : ${producto.sizes}">
                                    <input type="radio" name="selectedSize" th:value="${size}" th:required="${iter.index == 0}">
                                    <span th:text="${size}">M</span>
                                </label>
                            </div>
                        </div>

                        <span class="section-label">Cantidad</span>
                        <div class="purchase-row">
                            <input type="number" name="quantity" value="1" min="1" th:max="${producto.stock}" class="quantity-input" required>
                            <button type="submit" class="btn-primary btn-cart">Añadir a bolsa</button>
                        </div>
                    </form>
                </div>

                <div th:if="${producto.stock <= 0 or producto.status.name() == 'SOLD'}" class="sold-box">
                    Esta prenda ya no está disponible.
                </div>

                <div class="seller-card" th:if="${producto.seller != null}">
                    <div>
                        <strong th:text="${producto.seller.username}">Tienda</strong>
                        <span th:text="${producto.seller.location != null ? producto.seller.location : 'Sin ubicacion registrada'}">Ubicacion</span>
                    </div>
                    <a class="btn-link" th:href="@{/tienda/{id}(id=${producto.seller.id})}">Ver tienda</a>
                </div>
            </aside>
        </section>
    </main>
</body>
</html>
