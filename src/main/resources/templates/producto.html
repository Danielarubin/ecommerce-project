<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${producto.name} + ' - Bazarcito'">Detalle de prenda</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/pages/product.css}">
</head>
<body>
    <nav class="nav">
        <div class="nav-links">
            <a th:href="@{/colecciones}">Colecciones</a>
            <a th:href="@{/creadores}">Creadores</a>
            <a th:href="@{/tiendas}">Tiendas</a>
            <a th:href="@{/}+'#sobre-nosotros'">Sobre nosotros</a>
        </div>
            <a sec:authorize="isAuthenticated()" th:href="@{/dashboard}" class="nav-action">Mi cuenta</a>
        </div>
    </nav>

    <main class="detail-shell">
        <a class="back-link"
           th:href="${producto.seller != null ? '/tienda/' + producto.seller.id : '/colecciones'}">
            ← Volver
        </a>

        <section class="product-detail">
            <div class="media-panel">
                <div class="media-frame">
                    <img th:if="${producto.image != null and (producto.image.startsWith('http') or producto.image.startsWith('/uploads/'))}"
                         th:src="${producto.image}" th:alt="${producto.name}">
                    <img th:if="${producto.image != null and !(producto.image.startsWith('http') or producto.image.startsWith('/uploads/'))}"
                         th:src="@{'/images/' + ${producto.image}}" th:alt="${producto.name}">
                    <div class="media-empty" th:if="${producto.image == null}">Sin imagen</div>
                </div>
            </div>

            <aside class="info-panel">
                <div class="eyebrow" th:text="${producto.status != null ? producto.status : 'Disponible'}">Disponible</div>
                <h1 class="product-title" th:text="${producto.name}">Nombre de prenda</h1>
                <div class="brand-line" th:text="${producto.brand}">Marca</div>
                <div class="product-price" th:text="'$' + ${#numbers.formatDecimal(producto.price, 1, 'COMMA', 2, 'POINT')} + ' MXN'">$0 MXN</div>

                <div class="status-row">
                    <span class="chip" th:text="${producto.stock > 0 ? producto.stock + ' disponibles' : 'Agotado'}">Stock</span>
                    <span class="chip" th:if="${producto.sizes != null and !producto.sizes.isEmpty()}"
                          th:text="${producto.sizes.size()} + ' tallas'">Tallas</span>
                </div>

                <p class="description" th:if="${producto.description != null and !producto.description.isBlank()}"
                   th:text="${producto.description}">Descripcion</p>

                <div th:if="${producto.stock > 0 and producto.status.name() != 'SOLD'}">
                    <form th:action="@{/cart/add/{id}(id=${producto.id})}" method="post">
                        <div class="size-block" th:if="${producto.sizes != null and !producto.sizes.isEmpty()}">
                            <span class="section-label">Selecciona talla</span>
                            <div class="size-grid">
                                <label class="size-option" th:each="size, iter : ${producto.sizes}">
                                    <input type="radio" name="selectedSize" th:value="${size}" th:required="${iter.index == 0}">
                                    <span th:text="${size}">M</span>
                                </label>
                            </div>
                        </div>

                        <span class="section-label">Cantidad</span>
                        <div class="purchase-row">
                            <input type="number" name="quantity" value="1" min="1" th:max="${producto.stock}" class="quantity-input" required>
                            <button type="submit" class="btn-primary btn-cart">Añadir a bolsa</button>
                        </div>
                    </form>
                </div>

                <div th:if="${producto.stock <= 0 or producto.status.name() == 'SOLD'}" class="sold-box">
                    Esta prenda ya no está disponible.
                </div>

                <div class="seller-card" th:if="${producto.seller != null}">
                    <div>
                        <strong th:text="${producto.seller.username}">Tienda</strong>
                        <span th:text="${producto.seller.location != null ? producto.seller.location : 'Sin ubicacion registrada'}">Ubicacion</span>
                    </div>
                    <a class="btn-link" th:href="@{/tienda/{id}(id=${producto.seller.id})}">Ver tienda</a>
                </div>
            </aside>
        </section>
    </main>
</body>
</html>
