<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orden Confirmada - Bazar</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <style>
        .success-wrapper {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: var(--bg-primary);
            text-align: center;
        }
        .success-card {
            max-width: 600px;
            padding: 4rem;
            background: rgba(253, 250, 246, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }
        .success-icon {
            font-size: 4rem;
            margin-bottom: 2rem;
        }
        .success-title {
            font-family: var(--font-serif);
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 1rem;
            line-height: 1.1;
        }
        .success-title em {
            font-style: normal;
            font-weight: 800;
            color: var(--accent-color);
        }
        .success-desc {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 3rem;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <!-- MINIMAL NAVBAR -->
    <nav class="nav" style="grid-template-columns: 1fr;">
        <a class="nav-logo" th:href="@{/}" style="text-align: center;">Baz<span>ar</span>cito</a>
    </nav>

    <div class="success-wrapper">
        <div class="success-card">
            <div class="success-icon">✨</div>
            <h1 class="success-title">¡Orden <br><em>Confirmada!</em></h1>
            <p class="success-desc">Gracias por apoyar el diseño independiente. Hemos enviado un correo con los detalles de tu compra y tu número de seguimiento.</p>
            <a th:href="@{/}" class="btn-primary" style="display: inline-flex; text-decoration: none;">Seguir Explorando</a>
        </div>
    </div>
</body>
</html>
