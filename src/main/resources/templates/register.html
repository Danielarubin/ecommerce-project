<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Bazar</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body>
    <!-- NAVBAR -->
    <nav class="nav">
        <div>
            <a th:href="@{/}" class="btn-link" style="border:none; text-transform:uppercase; font-size: 0.75rem; letter-spacing:0.05em; display:inline-flex; align-items:center; gap:0.5rem;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Inicio
            </a>
        </div>
        <a class="nav-logo" th:href="@{/}">Baz<span>ar</span>cito</a>
        <div></div>
    </nav>

    <!-- REGISTER SECTION -->
    <div class="login-wrapper">
        <div class="login-card" style="max-width: 600px;">
            <span class="auth-kicker">Registro</span>
            <h1 class="login-title">Crea tu <em>cuenta</em></h1>
            <p class="login-desc">Registra tus datos para comprar, guardar favoritos o preparar tu tienda.</p>
            
            <div th:if="${error}" class="login-error">
                <p th:text="${error}"></p>
            </div>

            <form th:action="@{/register}" method="post" class="login-form">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre">
                    </div>
                    
                    <div class="form-group">
                        <label for="apellido">Apellido</label>
                        <input type="text" id="apellido" name="apellido" required placeholder="Tu apellido">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Correo electronico</label>
                        <input type="email" id="email" name="email" required placeholder="Tu correo">
                    </div>
                    
                    <div class="form-group">
                        <label for="telefono">Número de Teléfono</label>
                        <input type="tel" id="telefono" name="telefono" required placeholder="55 1234 5678">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="Crea una contraseña segura">
                </div>
                
                <button type="submit" class="btn-primary btn-submit">
                    Crear Cuenta
                </button>
            </form>
            
            <div class="login-footer">
                <a th:href="@{/login}" class="btn-link">¿Ya tienes cuenta? Inicia sesión</a>
            </div>
            
        </div>
    </div>
</body>
</html>
