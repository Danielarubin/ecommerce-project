<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel - Bazar</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <style>
        .dashboard-container { max-width: 1200px; margin: 4rem auto; padding: 0 2rem; }
        .dashboard-header { margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; }
        .grid-dashboard { display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; }
        @media (max-width: 768px) { .grid-dashboard { grid-template-columns: 1fr; } }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-control { width: 100%; padding: 0.75rem; margin-top: 0.5rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;}
    </style>
</head>
<body>
    <nav class="nav">
        <div>
            <a th:href="@{/}" class="btn-link" style="border:none;">Volver al Inicio</a>
        </div>
        <a class="nav-logo" th:href="@{/}">Baz<span>ar</span>cito</a>
        <div>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-link" style="border:none; cursor:pointer;">Cerrar Sesión</button>
            </form>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1 th:text="'Hola, ' + ${user.firstName}">Hola</h1>
            <p th:text="'Nivel de cuenta: ' + ${user.role}">Rol</p>
        </div>

        <!-- VISTA DE VENDEDOR -->
        <div th:if="${user.role.name() == 'SELLER'}" class="grid-dashboard">
            <div class="card">
                <h3>Subir Nuevo Producto</h3>
                <form th:action="@{/dashboard/producto/nuevo}" method="post" th:object="${newProduct}">
                    <div style="margin-bottom:1rem;">
                        <label>Nombre del Producto</label>
                        <input type="text" th:field="*{name}" class="form-control" required>
                    </div>
                    <div style="margin-bottom:1rem;">
                        <label>Marca / Colección</label>
                        <input type="text" th:field="*{brand}" class="form-control" required>
                    </div>
                    <div style="margin-bottom:1rem;">
                        <label>Precio ($)</label>
                        <input type="number" step="0.01" th:field="*{price}" class="form-control" required>
                    </div>
                    <div style="margin-bottom:1rem;">
                        <label>Inventario (Unidades)</label>
                        <input type="number" th:field="*{stock}" class="form-control" required>
                    </div>
                    <div style="margin-bottom:1rem;">
                        <label>URL de la Imagen (Opcional)</label>
                        <input type="text" th:field="*{image}" class="form-control" placeholder="ej. chaqueta.jpg">
                    </div>
                    <button type="submit" class="btn-primary" style="width:100%;">Publicar Producto</button>
                </form>
            </div>
            
            <div class="card">
                <h3>Mi Catálogo Activo</h3>
                <div th:if="${#lists.isEmpty(misProductos)}">
                    <p>Aún no tienes productos publicados.</p>
                </div>
                <div th:each="prod : ${misProductos}" style="border-bottom: 1px solid #eee; padding: 1rem 0; display:flex; justify-content: space-between;">
                    <div>
                        <strong th:text="${prod.name}">Producto</strong> - <span th:text="${prod.brand}">Marca</span>
                        <p style="margin: 0; color: #666; font-size:0.9rem;" th:text="'Stock: ' + ${prod.stock} + ' | Precio: $' + ${#numbers.formatDecimal(prod.price, 1, 'COMMA', 2, 'POINT')}">Stock</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- VISTA DE COMPRADOR -->
        <div th:if="${user.role.name() == 'BUYER'}" class="card">
            <h3>Mi Historial de Compras</h3>
            <div th:if="${#lists.isEmpty(misOrdenes)}">
                <p>Aún no has realizado ninguna compra.</p>
                <a th:href="@{/}" class="btn-primary" style="display:inline-block; margin-top:1rem;">Explorar Tienda</a>
            </div>
            <div th:each="orden : ${misOrdenes}" style="border-bottom: 1px solid #eee; padding: 1rem 0;">
                <strong th:text="'Orden #' + ${orden.id} + ' - ' + ${#temporals.format(orden.orderDate, 'dd/MM/yyyy HH:mm')}">Orden</strong>
                <p style="margin: 0; color: #666; font-size:0.9rem;" th:text="'Total: $' + ${orden.totalAmount}"></p>
            </div>
        </div>
    </div>
</body>
</html>
