<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertirse en Creador - Bazar</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <style>
        .onboarding-wrapper {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            background: var(--bg-secondary);
        }
        .onboarding-card {
            background: white;
            padding: 4rem;
            border-radius: 4px;
            max-width: 600px;
            width: 100%;
            border: 1px solid var(--border-color);
        }
        .onboarding-title {
            font-family: var(--font-serif);
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.1;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            font-family: var(--font-sans);
            font-size: 1rem;
            border-radius: 4px;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--text-dark);
        }
        .btn-submit {
            margin-top: 1rem;
            width: 100%;
            justify-content: center;
        }
    </style>
</head>

<body>
    <!-- MINIMAL NAVBAR -->
    <nav class="nav" style="grid-template-columns: 1fr;">
        <a class="nav-logo" th:href="@{/}" style="text-align: center;">Baz<span>ar</span>cito</a>
    </nav>

    <div class="onboarding-wrapper">
        <div class="onboarding-card">
            <h1 class="onboarding-title">Tu espacio <em>editorial</em>.</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Abre tu tienda independiente o únete como creador individual para curar y vender tus piezas únicas.</p>
            
            <form th:action="@{/vender/crear-perfil}" method="POST">
                <div class="form-group">
                    <label class="form-label" for="name">Nombre de la Tienda / Creador</label>
                    <input type="text" id="name" name="name" class="form-control" required placeholder="Ej. Archivo Vintage">
                </div>
                <div class="form-group">
                    <label class="form-label" for="location">Ubicación</label>
                    <input type="text" id="location" name="location" class="form-control" required placeholder="Ej. Ciudad de México">
                </div>
                <div class="form-group">
                    <label class="form-label" for="tags">Etiquetas (separadas por coma)</label>
                    <input type="text" id="tags" name="tags" class="form-control" placeholder="Ej. Y2K, Denim, Artesanal">
                </div>
                
                <button type="submit" class="btn-primary btn-submit">Crear Mi Espacio</button>
            </form>
        </div>
    </div>
</body>
</html>
