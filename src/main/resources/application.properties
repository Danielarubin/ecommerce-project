# ═══════════════════════════════════════════════════════
#  application.properties  — Configuración principal
#  Usa variables de entorno en prod, fallback para local
# ═══════════════════════════════════════════════════════

# Server
server.port=${PORT:8080}
# ── PostgreSQL ──────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://dpg-d7t38ajeo5us73f1algg-a.ohio-postgres.render.com:5432/db_bazar_fj8f}
spring.datasource.username=${DB_USER:bazar_user}
spring.datasource.password=${DB_PASSWORD:uRLp7QVL8mIdiYn8tjKBG1AAlhnBzEZ5}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Permite acceder a colecciones LAZY durante el rendering de Thymeleaf
spring.jpa.open-in-view=true

# ── Multipart (subida de imágenes) ──────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# ── Cloudinary ──────────────────────────────────────────
# Configura la variable de entorno CLOUDINARY_URL en tu sistema:
#   export CLOUDINARY_URL=cloudinary://API_KEY:API_SECRET@CLOUD_NAME
# O define las credenciales directamente (solo para desarrollo):
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ── Logging ─────────────────────────────────────────────
logging.level.com.school.ecommerce=INFO
logging.level.org.hibernate.SQL=WARN

# Datos de ejemplo (desactivado para trabajar 100% con datos reales)
app.seed-demo-data=false
