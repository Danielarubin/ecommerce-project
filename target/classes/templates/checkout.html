<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Bazar</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/checkout.css}">
</head>

<body>
    <!-- MINIMAL NAVBAR -->
    <nav class="nav" style="grid-template-columns: auto 1fr auto; padding: 0 2rem;">
        <div>
            <a th:href="@{/}" class="btn-link" style="border:none; text-transform:uppercase; font-size: 0.75rem; letter-spacing:0.05em; display:inline-flex; align-items:center; gap:0.5rem;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Volver a la tienda
            </a>
        </div>
        <a class="nav-logo" th:href="@{/}" style="text-align: center;">Baz<span>ar</span>cito</a>
        <div style="width: 100px;"></div>
    </nav>

    <!-- CHECKOUT SECTION -->
    <div class="checkout-wrapper">
        <div class="checkout-grid">
            <!-- Columna Izquierda: Formulario -->
            <div class="checkout-form-col">
                <h2 class="checkout-title">Finalizar <em>Compra</em></h2>
                
                <form th:action="@{/checkout}" method="post" class="checkout-form">
                    
                    <div class="form-section">
                        <h3>1. Datos de Contacto</h3>
                        <div class="form-group">
                            <label for="email">Correo Electrónico</label>
                            <input type="email" id="email" required placeholder="usuario@ejemplo.com">
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>2. Dirección de Envío</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="nombre">Nombre</label>
                                <input type="text" id="nombre" required placeholder="Tu nombre">
                            </div>
                            <div class="form-group">
                                <label for="apellido">Apellido</label>
                                <input type="text" id="apellido" required placeholder="Tu apellido">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="direccion">Calle y número</label>
                            <input type="text" id="direccion" required placeholder="Av. Siempre Viva 123">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="ciudad">Ciudad</label>
                                <input type="text" id="ciudad" required placeholder="Ciudad de México">
                            </div>
                            <div class="form-group">
                                <label for="cp">Código Postal</label>
                                <input type="text" id="cp" required placeholder="12345">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>3. Pago (Simulado)</h3>
                        <div class="payment-mock">
                            <p>Pago seguro a través de Stripe.</p>
                            <div class="form-group" style="margin-top: 1rem;">
                                <label>Número de Tarjeta</label>
                                <input type="text" placeholder="**** **** **** 4242" disabled style="background: rgba(0,0,0,0.02); cursor: not-allowed;">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; font-size: 1rem; padding: 1.5rem;">
                        Confirmar y Pagar
                    </button>
                </form>
            </div>

            <!-- Columna Derecha: Resumen -->
            <div class="checkout-summary-col">
                <div class="summary-card">
                    <h3>Resumen de tu Orden</h3>
                    
                    <div class="summary-items">
                        <div class="s-item" th:each="item : ${cartItems}">
                            <img th:src="@{'/images/' + ${item.image}}" th:alt="${item.name}">
                            <div class="s-item-info">
                                <h4 th:text="${item.name}">Nombre Producto</h4>
                                <p th:text="${item.brand}">Marca</p>
                                <span th:text="'Cant: ' + ${item.qty}">Cant: 1</span>
                            </div>
                            <div class="s-item-price" th:text="${#numbers.formatCurrency(item.price * item.qty)}">$0.00</div>
                        </div>
                    </div>

                    <div class="summary-totals">
                        <div class="s-row">
                            <span>Subtotal</span>
                            <span th:text="${#numbers.formatCurrency(cartTotal)}">$0.00</span>
                        </div>
                        <div class="s-row">
                            <span>Envío</span>
                            <span>Gratis</span>
                        </div>
                        <div class="s-row s-total">
                            <span>Total</span>
                            <span th:text="${#numbers.formatCurrency(cartTotal)}">$0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
