<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Hub - Bazar</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <style>
        .hub-header {
            padding: 8rem 2rem 4rem;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid var(--border-color);
        }
        .hub-title {
            font-family: var(--font-serif);
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.1;
        }
        .hub-stats {
            display: flex;
            gap: 2rem;
            margin-top: 1.5rem;
        }
        .stat-box {
            text-align: left;
        }
        .stat-val {
            display: block;
            font-size: 2rem;
            font-weight: 600;
        }
        .stat-lbl {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .hub-content {
            padding: 4rem 2rem;
        }
        .empty-hub {
            text-align: center;
            padding: 4rem;
            background: var(--bg-secondary);
            border-radius: 4px;
            border: 1px dashed var(--border-color);
        }
    </style>
</head>

<body>
    <!-- NAVBAR -->
    <nav class="nav">
        <div class="nav-links">
            <a th:href="@{/colecciones}">Colecciones</a>
            <a th:href="@{/creadores}">Creadores</a>
            <a th:href="@{/tiendas}">Tiendas</a>
        </div>
        <a class="nav-logo" th:href="@{/}">Baz<span>ar</span>cito</a>
        <div class="nav-right">
            <a th:href="@{/vender}" class="nav-action active">Vender</a>
            <a th:if="${session.user != null}" th:href="@{/logout}" class="nav-action" th:text="'Hola, ' + ${session.user} + ' (Salir)'">Salir</a>
        </div>
    </nav>

    <header class="hub-header">
        <div>
            <span style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500;">Creator Studio</span>
            <h1 class="hub-title" th:text="${creator.name}">Mi Tienda</h1>
            <div class="hub-stats">
                <div class="stat-box">
                    <span class="stat-val" th:text="${creator.numberOfItems}">0</span>
                    <span class="stat-lbl">Piezas</span>
                </div>
            </div>
        </div>
        <div>
            <a th:href="@{/vender/subir-producto}" class="btn-primary" style="text-decoration: none;">+ Subir Pieza</a>
        </div>
    </header>

    <main class="hub-content">
        <h2 style="font-family: var(--font-serif); font-size: 2rem; margin-bottom: 2rem;">Tus Piezas</h2>
        
        <div th:if="${myProducts == null or myProducts.isEmpty()}" class="empty-hub">
            <h3 style="font-size: 1.5rem; margin-bottom: 1rem;">Aún no tienes piezas.</h3>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Sube tu primera prenda para que la comunidad la descubra.</p>
            <a th:href="@{/vender/subir-producto}" class="btn-outline" style="text-decoration: none; display: inline-flex;">Subir Pieza</a>
        </div>

        <div th:if="${myProducts != null and !myProducts.isEmpty()}" class="editorial-grid-row2">
            <!-- Thymeleaf loop -->
            <article class="product-card" th:each="producto : ${myProducts}">
                <div class="product-image">
                    <img th:if="${producto.image != null and !producto.image.startsWith('/uploads/')}" th:src="@{'/images/' + ${producto.image}}" th:alt="${producto.name}">
                    <img th:if="${producto.image != null and producto.image.startsWith('/uploads/')}" th:src="${producto.image}" th:alt="${producto.name}">
                </div>
                <div class="product-info">
                    <div class="pi-header">
                        <h3 th:text="${producto.name}">Nombre</h3>
                        <span class="price" th:text="${producto.price}">$0</span>
                    </div>
                </div>
            </article>
        </div>
    </main>
</body>
</html>
