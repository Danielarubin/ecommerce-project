<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceder - Bazar</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body>
    <!-- NAVBAR -->
    <nav class="nav">
        <div>
            <a th:href="@{/}" class="btn-link" style="border:none; text-transform:uppercase; font-size: 0.75rem; letter-spacing:0.05em; display:inline-flex; align-items:center; gap:0.5rem;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Inicio
            </a>
        </div>
        <a class="nav-logo" th:href="@{/}">Baz<span>ar</span>cito</a>
        <div></div>
    </nav>

    <!-- LOGIN SECTION -->
    <div class="login-wrapper">
        <div class="login-card">
            <h1 class="login-title">Bienvenido de <br><em>vuelta</em></h1>
            <p class="login-desc">Ingresa tus credenciales para acceder a tu cuenta y guardar tus piezas favoritas.</p>
            
            <div th:if="${error}" class="login-error">
                <p th:text="${error}"></p>
            </div>

            <!-- Login Form (Mock) -->
            <form th:action="@{/login}" method="post" class="login-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required placeholder="usuario@ejemplo.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-primary btn-submit">
                    Iniciar Sesión
                </button>
            </form>
            
            <div class="login-footer">
                <a th:href="@{/register}" class="btn-link">¿No tienes cuenta? Regístrate</a>
                <br><br>
                <a href="#" class="btn-link" style="color: var(--text-muted); border-bottom-color: var(--text-muted);">¿Olvidaste tu contraseña?</a>
            </div>
            
            <div class="login-hint">
                <p>(Para probar, puedes usar cualquier correo y contraseña)</p>
            </div>
        </div>
    </div>
</body>
</html>
